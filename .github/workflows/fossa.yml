name: FOSSA Image Scan

on:
  push:
    branches: [ test/trivy-scan ]

jobs:
  fossa-image:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t my-app:latest .

      - name: Install FOSSA CLI v3 (latest)
        run: |
          curl -H 'Cache-Control: no-cache' https://raw.githubusercontent.com/fossas/fossa-cli/master/install-latest.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify FOSSA CLI version
        run: fossa --version

      - name: Save Docker image to file
        run: docker save my-app:latest -o image.tar

      - name: Scan Docker Image (from tar file)
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
        run: |
          # Scan from the tar file instead of directly from Docker
          fossa container analyze image.tar \
            --project security-guardrails-poc \
            --revision $GITHUB_SHA \
            --debug

          fossa test \
            --project security-guardrails-poc \
            --revision $GITHUB_SHA

      - name: Upload FOSSA report URL
        if: always()
        run: |
          echo "FOSSA Report: https://app.fossa.com/projects/custom%2B28356%2Fsecurity-guardrails-poc/refs/branch/master/$GITHUB_SHA"