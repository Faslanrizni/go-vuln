name: Security

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  pull-requests: write
  issues: write
  id-token: write
  attestations: write
  packages: write        # required to push to GHCR

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      # Exposes the GHCR image ref so downstream jobs can pull/sign it.
      # Format: ghcr.io/faslanrizni/go-vuln:abc1234...
      image-ref: ${{ steps.set-ref.outputs.ref }}

    steps:
      - uses: actions/checkout@v4

      # ── Log in to GHCR BEFORE building ───────────────────────────────────
      # The image must be pushed so Trivy (and Cosign) can pull it by ref.
      # Without this push, trivy-image gets a 404 and cosign gets UNAUTHORIZED.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image ref
        id: set-ref
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "ref=ghcr.io/${REPO}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image to GHCR
        run: |
          docker build -t "${{ steps.set-ref.outputs.ref }}" .
          docker push "${{ steps.set-ref.outputs.ref }}"
          echo " Image pushed: ${{ steps.set-ref.outputs.ref }}"

      # Keep a local tar for any jobs that need the image without pulling
      - name: Save image artifact
        run: docker save "${{ steps.set-ref.outputs.ref }}" -o /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  security:
    needs: build
    # No job-level permissions block here — inherits top-level permissions.
    # A job-level block REPLACES the top-level block entirely, which would
    # drop attestations/packages/contents:write to "none" and break
    # supply-chain-provenance signing.
    uses: Faslanrizni/security-guardrails-faslan/.github/workflows/security-orchestrator.yml@testing
    with:
      enable-fossa: true
    secrets:
      FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
    # with:
    #   # Now a real GHCR ref — Trivy can pull it, Cosign can sign it
    #   image-ref: ${{ needs.build.outputs.image-ref }}
    # secrets:
    #   FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}

    