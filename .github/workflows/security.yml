name: Security

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write        # Upload attestation artifacts
  security-events: write # Upload SARIF to GitHub Security tab
  pull-requests: write   # Post PR comments
  issues: write          # Create freeze issues (secrets scanner)
  id-token: write        # OIDC token for Cosign keyless signing
  attestations: write    # Store SLSA provenance in GitHub Attestations API
  packages: write        # Push signed images to GHCR (if image signing used)


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t myapp:${{ github.sha }} .
          docker save myapp:${{ github.sha }} -o /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  security:
    needs: build
    # permissions:
    #   contents: read
    #   security-events: write    
    #   pull-requests: write 
    #   issues: write  
    #   id-token: write
    uses: Faslanrizni/security-guardrails-faslan/.github/workflows/security-orchestrator.yml@testing
    with:
      image-ref: ${{ needs.build.outputs.image-ref }}
    secrets:
      FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}